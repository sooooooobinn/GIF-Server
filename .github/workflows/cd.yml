name: Spring Boot CD
on:
  push:
    branches: ['main']
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 25 설정
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Gradle 설정
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: Gradle 빌드
        run: ./gradlew clean build -x test

      - name: 서버로 파일 전송 (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 21103
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml,Dockerfile,nginx/nginx.conf,nginx/ssl-init.sh,nginx/certbot-renew.sh,build/libs/GIF-0.0.1-SNAPSHOT.jar"
          target: "~/gif-server"

      - name: 서버 배포 (SSH)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 21103
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            mkdir -p ~/gif-server/nginx/ssl

            cat > ~/gif-server/.env << EOF
            DOMAIN=${{ secrets.DOMAIN }}
            DB_HOST=jdbc:mysql://mariadb:3306/${{ secrets.DB_NAME }}?serverTimezone=Asia/Seoul
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
            DB_DDL=update
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            JWT_EXPIRATION=3600000
            UPLOAD_DIR=/uploads/
            EOF

            DOMAIN="${{ secrets.DOMAIN }}"
            if [ -n "$DOMAIN" ]; then
              bash ~/gif-server/nginx/ssl-init.sh "$DOMAIN"
            elif [ ! -f ~/gif-server/nginx/ssl/fullchain.pem ]; then
              echo "ERROR: DOMAIN secret이 비어있고 SSL 인증서도 없습니다."
              echo "GitHub Secrets에 DOMAIN을 추가하거나 서버에서 직접 실행하세요:"
              echo "  bash ~/gif-server/nginx/ssl-init.sh gif-server.duckdns.org"
              exit 1
            fi

            cd ~/gif-server
            docker build -t gif-server:latest .
            docker ps -q --filter "label=com.docker.compose.project=gif-server" | xargs -r docker stop
            docker ps -aq --filter "label=com.docker.compose.project=gif-server" | xargs -r docker rm
            docker network rm gif-server_default 2>/dev/null || true
            docker-compose up -d
            docker image prune -f

            docker-compose exec -T nginx nginx -s reload || true

      - name: GIF_SERVER CD Discord Notification (success)
        if: ${{ success() }}
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_GIF_SERVER }}
          title: '✅ 성공 했다능! ✅'
          status: ${{ job.status }}
          description: '서버 배포 성공'
          color: 65280
          username: 'GIF-SERVER-bot'

      - name: GIF_SERVER CD Discord Notification (failure)
        if: ${{ failure() }}
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_GIF_SERVER }}
          title: '❗️ 실패했다능! ❗️'
          status: ${{ job.status }}
          description: '서버 배포 실패'
          color: 16711680
          username: 'GIF-SERVER-bot'
